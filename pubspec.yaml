name: website_app
description: Professional app converted from website natively.
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.5
  dio: ^5.5.0
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  html: ^0.15.4
  flutter_widget_from_html: ^0.14.11 # Updated to latest version to fix platformViewRegistry error.

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/url.txt
    - assets/images/logo.png
