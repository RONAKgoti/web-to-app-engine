name: website_app
description: Professional app converted from website natively.
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^13.2.0
  dio: ^5.4.3
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10
  font_awesome_flutter: ^10.7.0
  intl: ^0.19.0
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  html: ^0.15.4
  flutter_widget_from_html: ^0.15.1 # Updated to 0.15.1 to fix Flutter SDK mismatch (Flex spacing error).
  webview_flutter: 4.9.0

  # UI & Responsive
  flutter_screenutil: ^5.9.0
  animations: ^2.0.11
  
  # Firebase & Mobile Services
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  
  # Icons & Native
  cupertino_icons: ^1.0.8
  connectivity_plus: ^7.0.0
  permission_handler: ^12.0.1
  in_app_review: ^2.0.11
  path_provider: ^2.1.5
  webview_flutter_android: ^3.16.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.4.0
  json_serializable: ^6.7.1
  flutter_native_splash: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/url.txt
    - assets/images/logo.png
    - assets/images/icon.png # For launcher icons
    - assets/images/splash.png # For splash screen

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/splash.png
  android: true
  ios: true
  fullscreen: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/icon.png"
  min_sdk_android: 21


